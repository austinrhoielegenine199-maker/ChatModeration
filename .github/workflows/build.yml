name: Build ChatModeration

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: gradle build

      - name: Upload Plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: ChatModeration
          path: build/libs/*.jar
